<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#03695e"/>
  <!-- 寶石頂面 -->
  <polygon points="12,7 20,7 23,12 9,12" fill="rgba(255,255,255,0.85)"/>
  <!-- 寶石左面 -->
  <polygon points="9,12 16,25 12,7" fill="rgba(255,255,255,0.35)"/>
  <!-- 寶石右面 -->
  <polygon points="23,12 16,25 20,7" fill="rgba(255,255,255,0.6)"/>
  <!-- 腰線 -->
  <line x1="9" y1="12" x2="23" y2="12" stroke="rgba(255,255,255,0.5)" stroke-width="0.5"/>
  <!-- 外框 -->
  <polygon points="12,7 20,7 23,12 16,25 9,12" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>
</svg>